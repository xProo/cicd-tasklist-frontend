sonar.projectKey=tasklist-frontend
sonar.projectName=tasklist-frontend
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.tests=src/__tests__
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/__tests__/**,**/node_modules/**,dist/**,coverage/**
sonar.test.inclusions=**/__tests__/**/*.test.ts,**/__tests__/**/*.test.tsx
sonar.coverage.exclusions=src/main.tsx,src/vite-env.d.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.junit.reportPaths=reports/junit.xml
